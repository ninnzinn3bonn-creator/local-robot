<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local Robot</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Waterway Robot</h1>
        <p id="statusText">起動中</p>
      </div>
      <div class="top-actions">
        <button class="danger" id="estopButton" type="button">緊急停止</button>
        <button id="resetEstopButton" type="button">解除</button>
        <div class="state-pill" id="statePill">
          <span class="state-dot"></span>
          <span id="stateLabel">起動中</span>
        </div>
      </div>
    </header>

    <main class="workspace">
      <section class="vision-pane" aria-label="カメラ映像">
        <div class="camera-frame">
          <img id="cameraImage" alt="現在のカメラ映像" />
          <div class="camera-empty" id="cameraEmpty">カメラ準備中</div>
        </div>
        <div class="status-grid">
          <div>
            <span class="label">Wake Word</span>
            <strong id="wakeWord">ジロー</strong>
          </div>
          <div>
            <span class="label">手動起動</span>
            <strong id="manualStatus">待機なし</strong>
          </div>
          <div>
            <span class="label">連続会話</span>
            <strong id="continuousStatus">待機なし</strong>
          </div>
          <div>
            <span class="label">安全</span>
            <strong id="safetyStatus">初期化中</strong>
          </div>
          <div>
            <span class="label">ミッション</span>
            <strong id="missionStatus">待機中</strong>
          </div>
          <div>
            <span class="label">清掃</span>
            <strong id="cleaningStatus">OFF</strong>
          </div>
        </div>
      </section>

      <section class="chat-pane" aria-label="操作卓">
        <section class="connection-panel" aria-label="接続状態">
          <div>
            <span class="label">接続</span>
            <strong id="connectionStatus">未接続</strong>
            <p id="connectionDetail">ローカル操作卓へ接続します</p>
          </div>
          <button class="primary" id="connectButton" type="button">接続</button>
        </section>

        <div class="robot-console">
          <section class="console-block" aria-label="ロボット操作">
            <div class="block-title">
              <h2>操作</h2>
              <span id="driveStatus">停止中</span>
            </div>
            <div class="drive-pad">
              <button id="forwardButton" type="button">前進</button>
              <button id="leftButton" type="button">左</button>
              <button class="stop" id="stopButton" type="button">停止</button>
              <button id="rightButton" type="button">右</button>
              <button id="reverseButton" type="button">後退</button>
            </div>
            <div class="tool-row">
              <button id="cleanOnButton" type="button">清掃ON</button>
              <button id="cleanOffButton" type="button">清掃OFF</button>
              <button id="lightsButton" type="button">ライト</button>
            </div>
          </section>

          <section class="console-block" aria-label="ミッション">
            <div class="block-title">
              <h2>ミッション</h2>
              <span id="missionNote">待機中</span>
            </div>
            <div class="mission-row">
              <button id="missionStartButton" type="button">開始</button>
              <button id="missionPauseButton" type="button">一時停止</button>
              <button id="missionResumeButton" type="button">再開</button>
              <button id="missionFinishButton" type="button">完了</button>
            </div>
          </section>

          <section class="console-block" aria-label="AI認識">
            <div class="block-title">
              <h2>AI認識</h2>
              <span id="planIntent">待機中</span>
            </div>
            <dl class="robot-readout">
              <div>
                <dt>観察</dt>
                <dd id="observationText">まだ観察メモはありません</dd>
              </div>
              <div>
                <dt>危険</dt>
                <dd id="hazardsText">なし</dd>
              </div>
              <div>
                <dt>提案</dt>
                <dd id="actionPlanText">なし</dd>
              </div>
            </dl>
          </section>

          <section class="digital-twin" aria-label="3Dデジタルツイン">
            <div class="block-title">
              <h2>Digital Twin</h2>
              <span id="twinStatus">stopped</span>
            </div>
            <div class="twin-stage">
              <canvas id="twinCanvas"></canvas>
              <div class="twin-overlay">
                <span id="twinPose">x 0.00 / z 0.00 / yaw 0°</span>
              </div>
            </div>
          </section>
        </div>

        <details class="chat-drawer" id="chatDrawer">
          <summary>
            <span>チャット履歴・入力</span>
            <span id="chatBadge">0件</span>
          </summary>

          <div class="chat-drawer-body">
            <div class="controls">
              <button class="primary" id="listenButton" type="button">話しかける</button>
              <button id="endButton" type="button">会話終了</button>
              <button id="clearButton" type="button">消去</button>
            </div>

            <form class="text-entry" id="textForm">
              <input
                id="textInput"
                name="text"
                type="text"
                autocomplete="off"
                placeholder="音声が崩れるときはここに入力"
              />
              <button type="submit">送信</button>
            </form>

            <div class="session-meter" aria-live="polite">
              <div class="meter-row">
                <span id="sessionText">ウェイクワード待機中</span>
                <span id="sessionTime">0.0秒</span>
              </div>
              <div class="meter-track">
                <div class="meter-fill" id="sessionFill"></div>
              </div>
            </div>

            <ol class="messages" id="messages" aria-live="polite"></ol>
          </div>
        </details>
      </section>
    </main>

    <script type="module" src="/static/twin.js?v=20260518-operator-4"></script>
    <script src="/static/app.js?v=20260518-operator-4"></script>
  </body>
</html>
