device: "cpu"              # Ollamaは独立してGPUを使う。ここは主にSTT用

llm:
  backend: "ollama"         # ollama / gemma / qwen
  model_id: "qwen2.5vl:7b"  # 互換用。vision_model_id 未指定時にも使う
  chat_model_id: "gemma3:12b"      # 通常会話は応答品質が安定したモデルを使う
  vision_model_id: "qwen2.5vl:7b"  # 視覚参照がある発話だけVLMを使う
  endpoint: "http://127.0.0.1:11434"
  quantization: "q4"
  dtype: "auto"
  max_new_tokens: 256
  context_window: 128000
  ground_vision: true       # 画像つきターンは、まず観察メモを作ってから会話する
  vision_grounding_tokens: 180
  vision_grounding_prompt: |
    この画像をロボットの観察メモとして解析してください。
    見えている事実だけを書き、推測や想像は書かないでください。
    人、物、文字、位置関係、移動や接触で注意すべき点を短い箇条書きにしてください。
    見えないものは「見えない」または「不明」と書いてください。
    毎回同じ定型文にせず、このフレーム固有の情報を優先してください。
  system_prompt: |
    あなたは「じろえもん」という日本語のローカルロボット相棒です。
    役割は、ユーザーと普通に会話しながら、必要なときだけ周囲の状況を見て補助することです。
    カメラ映像は、ロボットとして安全に動くための状況把握や、ユーザーが「これ」「そこ」「見えるもの」と言ったときの補助情報として使います。
    ユーザーが明示的に聞いていない限り、画面説明だけを返さないでください。
    画像を受け取っても、会話の主題が画像でなければ、画像内の物体や背景に触れないでください。
    画像が渡されていないターンでは、目の前の物、机、部屋、充電ステーションなどの周囲状況を想像しないでください。
    まずユーザーの発話意図に答え、視界情報が役に立つ場合だけ自然に一文添えてください。
    性格は、やさしく、親しみやすく、少しおちゃめで、頼れる未来の相棒です。
    断定しすぎず、ユーザーが考えやすくなるように足りない視点をそっと補ってください。
    応答は短めで会話的にしてください。
    音声で読み上げるため、絵文字や顔文字は使わないでください。

stt:
  backend: "faster-whisper" # faster-whisper / gemma
  model: "small"
  compute_type: "int8"
  language: "ja"
  initial_prompt: "ジロー、じろえもん、ヘイジロー。日本語の短い会話です。"
  hotwords: "ジロー じろえもん ヘイジロー これ 読んで 見て"
  hallucination_silence_threshold: 0.7
  local_files_only: true     # 完全オフライン運用: 事前に取得済みのローカルキャッシュだけ使う
  download_root: null

vad:
  backend: "energy"         # energy / silero
  threshold: 0.012
  min_speech_ms: 300
  min_silence_ms: 600
  max_speech_ms: 15000

tts:
  endpoint: "http://127.0.0.1:50021"
  speaker_id: 3            # ずんだもん（ノーマル）

camera:
  index: 0
  width: 1280
  height: 720
  capture_fps: 12          # Web UIを滑らかに見せるためのフレームバッファ更新頻度

mic:
  device: 1                # このPCでは AT2020USB-X。合わなければ scripts/check_env.py の番号へ変更

speaker:
  device: null             # 既定の出力デバイス

memory:
  max_turns: 10

wake_word:
  enabled: true
  phrase: "ジロー"
  aliases:
    - "ジロー"
    - "じろー"
    - "じろう"
    - "ジロウ"
    - "二郎"
    - "じろえもん"
    - "ジロエモン"
    - "ジローエモン"
    - "じろーえもん"
    - "次郎衛門"
    - "じろうえもん"
    - "ねえジロー"
    - "ヘイジロー"
    - "ページロー"
    - "ペジロー"
    - "hey jiro"
    - "heyjiro"
    - "hello jiro"
  timeout_after_response_sec: 8   # 応答後この秒数は wake word 不要で連続会話可

logging:
  level: "INFO"
  conversation_log_dir: "./logs"
  save_frames: false        # true にすると ./logs/frames/ に画像を保存
  rotate: "daily"

language:
  primary: "ja"
  reject_other: true

ui:
  mode: "cli"
