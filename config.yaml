device: "cpu"              # Ollamaは独立してGPUを使う。ここはSTT用

llm:
  backend: "ollama"         # ollama / gemma / qwen
  model_id: "gemma3:4b"     # Ollamaの視覚対応Gemma系モデル
  endpoint: "http://127.0.0.1:11434"
  quantization: "q4"
  dtype: "auto"
  max_new_tokens: 256
  context_window: 128000
  system_prompt: |
    あなたはカメラ映像を見ながら会話する日本語アシスタントです。
    見えているものについて、簡潔かつ正確に答えてください。

stt:
  backend: "faster-whisper" # faster-whisper / gemma
  model: "small"
  compute_type: "int8"
  language: "ja"
  local_files_only: true     # 完全オフライン運用: 事前に取得済みのローカルキャッシュだけ使う
  download_root: null

vad:
  backend: "energy"         # energy / silero
  threshold: 0.012
  min_speech_ms: 300
  min_silence_ms: 600
  max_speech_ms: 15000

tts:
  endpoint: "http://127.0.0.1:50021"
  speaker_id: 3            # ずんだもん（ノーマル）

camera:
  index: 0
  width: 1280
  height: 720
  capture_fps: 2           # フレームバッファ更新頻度

mic:
  device: 1                # このPCでは AT2020USB-X。合わなければ scripts/check_env.py の番号へ変更

speaker:
  device: null             # 既定の出力デバイス

memory:
  max_turns: 10

wake_word:
  enabled: true
  phrase: "じろえもん"
  aliases:
    - "じろえもん"
    - "ジロエモン"
    - "次郎衛門"
    - "じろうえもん"
  timeout_after_response_sec: 8   # 応答後この秒数は wake word 不要で連続会話可

logging:
  level: "INFO"
  conversation_log_dir: "./logs"
  save_frames: false        # true にすると ./logs/frames/ に画像を保存
  rotate: "daily"

language:
  primary: "ja"
  reject_other: true

ui:
  mode: "cli"
